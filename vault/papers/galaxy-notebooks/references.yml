# Canonical bibliography for the Galaxy Notebooks manuscript.
#
# Single source of truth: the machine-readable data the site renderer and
# check_references.py consume. Keys match the inline citation key used in
# manuscript.md (`[Key]`). Per-entry editorial guidance ("where to cite") and
# section-level notes are kept here as `#` comments — they are not rendered.
# The renderer links/lists only cited keys; uncited entries are a tracked
# backlog and render nothing.

# ===== Core Galaxy =====

"Goecks 2010":
  kind: article
  authors: "Goecks J, Nekrutenko A, Taylor J, The Galaxy Team"
  year: 2010
  title: "Galaxy: a comprehensive approach for supporting accessible, reproducible, and transparent computational research in the life sciences"
  venue: "Genome Biology 11:R86"
  doi: "10.1186/gb-2010-11-8-r86"
  # guidance: Intro/Background. Cite specifically for Pages as interactive web documents communicating
  #           complete analyses; position Galaxy Notebooks as a history-attached, versioned continuation.

"Abueg 2024":
  kind: article
  authors: "Abueg LAL, Afgan E, Allart O, et al."
  year: 2024
  title: "The Galaxy platform for accessible, reproducible, and collaborative data analyses: 2024 update"
  venue: "Nucleic Acids Research 52:W83-W94"
  doi: "10.1093/nar/gkae410"
  # guidance: Background/Implementation context — current Galaxy scope, services, tool breadth.

# Uncited Galaxy documentation sources (no formal citation key; cite sparingly if needed):
