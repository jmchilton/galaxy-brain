# Canonical bibliography for the gxwf manuscript.
#
# Single source of truth: the machine-readable data the site renderer and
# check_references.py consume. Keys match the inline citation key used in
# manuscript.md (`[Key]`). Editorial guidance and status/verification notes are
# kept here as `#` comments — they are not rendered. The renderer links/lists
# only cited keys; uncited entries are a tracked backlog and render nothing.
#
# Status notes (surface in cover letter or a methods footnote):
#   - gxformat2, IWC, Cromwell, miniwdl, Sprocket, nf-schema, OpenWDL, LSP, Monaco,
#     Snakemake docs — no peer-reviewed publication; cited as repositories/specs.
#   - GA4GH TRS — specification only; cited alongside Dockstore (O'Connor 2017),
#     its peer-reviewed companion for the protocol.
#   - BioAgents 2025 — byline/venue record needs verification (see entry note).
#   - Xin 2024 (BIA) — preprint only; verify a peer-reviewed form before submission.

